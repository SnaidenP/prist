name: Build Multi-Platform Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: prist-x86_64-unknown-linux-gnu.tar.gz
            archive_type: tar

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: prist-aarch64-apple-darwin.tar.gz
            archive_type: tar

          - target: x86_64-apple-darwin
            os: macos-13
            asset_name: prist-x86_64-apple-darwin.tar.gz
            archive_type: tar

          - target: x86_64-pc-windows-msvc
            os: windows-2022
            asset_name: prist.exe-x86_64-pc-windows-msvc.zip
            archive_type: zip

          - target: aarch64-pc-windows-msvc
            os: windows-2022
            asset_name: prist.exe-aarch64-pc-windows-msvc.zip
            archive_type: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix (.tar.gz)
        if: matrix.archive_type == 'tar'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/prist staging/
          cp scripts/install.sh staging/
          tar -czf ${{ matrix.asset_name }} -C staging prist

      - name: Package Windows (.zip)
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          $exe = "target/${{ matrix.target }}/release/prist.exe"
          Copy-Item $exe $staging/
          Copy-Item scripts/install.ps1 $staging/
          Copy-Item scripts/uninstall.ps1 $staging/
          Compress-Archive -Path "$staging/*" -DestinationPath ${{ matrix.asset_name }} -Force

      - name: Generate SHA-256 (Unix)
        if: matrix.archive_type == 'tar'
        run: |
          shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Generate SHA-256 (Windows)
        if: matrix.archive_type == 'zip'
        shell: pwsh
        run: |
          $hash = (Get-FileHash ${{ matrix.asset_name }} -Algorithm SHA256).Hash
          "$hash  ${{ matrix.asset_name }}" | Out-File -Encoding ascii "${{ matrix.asset_name }}.sha256"

      - name: Upload Release Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          generate_release_notes: true
